name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        node: [20, 22]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.5

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Smoke test (limbo --version wraps fake claude)
        shell: bash
        run: |
          set -euo pipefail
          stub="$RUNNER_TEMP/fake-bin"
          mkdir -p "$stub"
          cat > "$stub/claude" <<'EOF'
          #!/bin/sh
          echo "9.9.9 (Claude Code)"
          EOF
          chmod +x "$stub/claude"
          export PATH="$stub:$PATH"
          out=$(node packages/host/dist/cli.js --version)
          printf '%s\n' "$out"
          printf '%s\n' "$out" | grep -qE '^limbo 0\.0\.0$'
          printf '%s\n' "$out" | grep -qE '^wraps: 9\.9\.9 \(Claude Code\)$'
