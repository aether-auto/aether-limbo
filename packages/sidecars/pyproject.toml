[project]
name = "aether-limbo-sidecars"
version = "0.0.0"
description = "Python sidecar adapters for aether-limbo (Instagram, X, TikTok)."
readme = "README.md"
requires-python = ">=3.11,<3.15"
license = { text = "MIT" }
authors = [{ name = "aether-limbo" }]
dependencies = []

[project.optional-dependencies]
instagram = ["instagrapi>=2.1.0"]
twitter = ["twikit>=2.0.0"]
tiktok = ["TikTokApi>=7.1.0", "playwright>=1.47.0"]
all = [
  "instagrapi>=2.1.0",
  "twikit>=2.0.0",
  "TikTokApi>=7.1.0",
  "playwright>=1.47.0",
]
dev = ["ruff>=0.6.0", "mypy>=1.11.0"]

[project.scripts]
limbo-sidecar = "limbo_sidecars.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/limbo_sidecars"]

[tool.ruff]
line-length = 100
target-version = "py311"
